<!DOCTYPE html>
<html>
	{% include head.html %}
	<style>
	
	.page-header{
		width: 100%;
		height: 50px;
		background-color: #000000;
		color: #FFFFFF;
	}
	.page{
		margin:20px auto;
		width: 100%;
		max-width: 1200px;
		padding: 20px;
		background-color: #FFFFFF;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
	}
	</style>
	<body>
		
		{% include header.html %}
		<div class="page">
			<h2>{{page.title}}</h2>
			<div>
				{{content}}
			</div>
			<div >
				{% if page.previous %}
				  <a href="/blog/{{page.previous.url}}">上一篇：{{page.previous.title}}</a>
				{% else %}
				  <span>上一篇：没有了</span>
				{% endif %}
				{% if page.next %}
				<a href="/blog/{{page.next.url}}">下一篇:{{page.next.title}}</a>
				{% else %}
				<span>下一篇：没有了</span>
				{% endif %}
			</div>
		</div>
		
		{% include footer.html %}
	</body>
</html>
