<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<style>
	.page{
		margin: auto;
		width: 100%;
		max-width: 1200px;
		display: flex;
		flex-wrap: wrap;
	}
	.page-body{
		width: 80%;
	}
	.page-right{
		width: 20%;
	}
	.label{
		font-size: 10px;
		margin: 0 20px;
		padding: 0 5px;
		background-color: #000;
		color: #FFFFFF;
	}
	</style>
	<body>
		<div>
			
		</div>
		<div class="page">
			<div class="page-body">
				<ul>
					{% for product in site.posts %}
					<li>
						<a href="/blog{{product.url}}">
							{{ product.title }}
						</a>
						<span class="label">{{product.categories}}</span>
						<div>{{product.date}}</div>
					</li>
					{% endfor %}
				</ul>
			</div>
			<div class="page-right">
				
			</div>
		</div>
	</body>
</html>
