<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title></title>
	</head>
	<style>
	body{
		background-color: #fafafa;
		margin: 0;
		padding: 0;
	}
	ul{
		list-style: none;
		padding: 0;
		margin: 0;
	}
	.page-header{
		width: 100%;
		height: 50px;
		background-color: #000000;
	}
	.page{
		margin:20px auto;
		width: 100%;
		max-width: 1200px;
		display: flex;
		flex-wrap: wrap;
	}
	.page-body{
		width: 79%;
		background-color: #FFFFFF;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
		padding: 20px;
	}
	.item-list{
		
	}
	.item-li{
		padding: 10px;
	}
	.item-title{
		text-decoration: none;
		color: #666;
	}
	.item-content{
		color: #999;
		font-size: 12px;
	}
	.item-time{
		margin-right: 20px;
	}
	.page-right{
		width: 19%;
		margin-left: 2%;
		background-color: #FFFFFF;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
	}
	.label{
		font-size: 12px;
		margin: 0 20px;
		padding: 0 5px;
		height: 18px;
		border-radius: 9px;
		background-color: #b9b9b9;
		color: #FFFFFF;
		
	}
	</style>
	<body>
		<div class="page-header">
			
		</div>
		<div class="page">
			<div class="page-body">
				<ul class="item-list">
					{% for item in site.posts %}
					<li class="item-li">
						<a class="item-title" href="/blog{{item.url}}">
							{{ item.title }}
						</a>
						<div class="item-content">
							<span class="item-time">{{item.date}}</span>
							<span class="label">{{item.categories}}</span>
						</div>
					</li>
					{% endfor %}
				</ul>
			</div>
			<div class="page-right">
				
			</div>
		</div>
	</body>
</html>
