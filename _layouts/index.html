<!DOCTYPE html>
<html>
	{% include head.html %}
	<style>
	.page{
		margin:20px auto;
		width: 100%;
		max-width: 1200px;
		display: flex;
		flex-wrap: wrap;
	}
	.page-body{
		width: 79%;
		background-color: #FFFFFF;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
		padding: 20px;
	}
	.item-list{
		
	}
	.item-li{
		padding: 10px;
		border-bottom: 1px solid #F0F0F0;
	}
	.item-title{
		color: #333;
	}
	.item-content{
		padding-top: 5px;
		color: #999;
		font-size: 12px;
	}
	.item-time{
		margin-right: 20px;
	}
	.page-right{
		width: 19%;
		margin-left: 2%;
		background-color: #FFFFFF;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
	}
	.label{
		font-size: 12px;
		margin: 0 20px;
		padding: 0 5px;
		height: 18px;
		border-radius: 9px;
		background-color: #b9b9b9;
		color: #FFFFFF;
	}
	</style>
	<body>
		{% include header.html %}
		<div class="page">
			<div class="page-body">
				<ul class="item-list">
					{% for item in site.posts %}
					<li class="item-li">
						<a  href="/blog{{item.url}}">
							<div class="item-title">
								{{ item.title }}
								
							</div>
							<div class="item-content">
								<span class="item-time">{{item.date}}</span>
								<span class="label">{{item.categories}}</span>
							</div>
						</a>
					</li>
					{% endfor %}
				</ul>
			</div>
			<div class="page-right">
				
			</div>
		</div>
		{% include footer.html %}
	</body>
</html>
